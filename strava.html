<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strava Activities by Country — Justin Guyette</title>
    <meta name="description" content="Strava activity stats broken down by country — runs, hikes, rides, and more.">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/strava.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://api.mapbox.com/mapbox.js/plugins/leaflet-fullscreen/v1.0.1/leaflet.fullscreen.css" rel="stylesheet" />
</head>

<body class="page strava-page">
    <div class="parallax-background"></div>
    <div class="parallax-overlay"></div>

    <nav-bar></nav-bar>

    <div class="content">
        <div class="hero strava-hero">
            <h1>Strava Activities</h1>
            <h2>Activities by Country</h2>
        </div>

        <!-- Loading -->
        <div id="loading-section" class="strava-loading">
            <div class="loading-spinner"></div>
            <p id="loading-status">Loading activities…</p>
        </div>

        <!-- Summary -->
        <div class="section" id="strava-summary-section">
            <div id="strava-summary"></div>
            <div id="cache-info" class="cache-info-bar"></div>
        </div>

        <!-- Activity type filters -->
        <div id="strava-filters" class="section"></div>

        <!-- Activity map (lazy-loaded) -->
        <div class="section">
            <h2>Activity Map <button class="cache-refresh-btn" id="map-toggle-btn" onclick="toggleMap()">Show map</button></h2>
            <div id="map-section" style="display:none">
                <div id="strava-map"></div>
                <div id="map-legend" class="map-legend"></div>
                <p id="map-status" class="no-location-note" style="margin-top:8px"></p>
            </div>
        </div>

        <!-- County Hunter (US, lazy-loaded) -->
        <div class="section">
            <h2>County Hunter <button class="cache-refresh-btn" id="county-toggle-btn" onclick="toggleCountyMap()">Show map</button></h2>
            <div id="county-section" style="display:none">
                <div id="county-stats-bar"></div>
                <div id="county-map"></div>
                <p id="county-status" class="no-location-note" style="margin-top:8px"></p>
            </div>
        </div>

        <!-- Tile Hunter (world, lazy-loaded) -->
        <div class="section">
            <h2>Tile Hunter <button class="cache-refresh-btn" id="tile-toggle-btn" onclick="toggleTileMap()">Show map</button></h2>
            <div id="tile-section" style="display:none">
                <div id="tile-stats-bar" class="county-stats-bar"></div>
                <div id="tile-map"></div>
                <p id="tile-status" class="no-location-note" style="margin-top:8px"></p>
            </div>
        </div>

        <!-- City Hunter (lazy-loaded) -->
        <div class="section">
            <h2>City Hunter
                <select id="city-select" class="city-select" onchange="switchCity(this.value)">
                    <option value="superior-co">Superior, CO</option>
                    <option value="boulder-co">Boulder, CO</option>
                </select>
                <button class="cache-refresh-btn" id="city-toggle-btn" onclick="toggleCityMap()">Show map</button>
            </h2>
            <div id="city-section" style="display:none">
                <div id="city-stats-bar" class="county-stats-bar"></div>
                <div id="city-map"></div>
                <div class="map-legend" style="margin-top:10px">
                    <span class="map-legend-item"><span class="map-legend-dot" style="background:#4CAF50"></span>Complete</span>
                    <span class="map-legend-item"><span class="map-legend-dot" style="background:#FF9800"></span>Partial</span>
                    <span class="map-legend-item"><span class="map-legend-dot" style="background:rgba(255,255,255,0.4)"></span>Not started</span>
                </div>
                <p id="city-status" class="no-location-note" style="margin-top:8px"></p>
            </div>
        </div>

        <!-- By Country table -->
        <div class="section">
            <h2>By Country</h2>
            <div id="strava-table-container"></div>
        </div>

        <!-- Regional breakdowns (US states, Canadian provinces, etc.) — rendered by JS -->
        <div id="strava-subdivisions"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://api.mapbox.com/mapbox.js/plugins/leaflet-fullscreen/v1.0.1/Leaflet.fullscreen.min.js"></script>
    <script src="js/strava.js"></script>
    <script src="js/navbar-component.js"></script>
</body>

</html>
