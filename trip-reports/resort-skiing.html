<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resort Skiing - Trip Report</title>
    <meta name="description" content="Resorts skied across the US and beyond — from Utah powder to the Alps.">
    <meta property="og:title" content="Resort Skiing - Trip Report">
    <meta property="og:description" content="Resorts skied across the US and beyond — from Utah powder to the Alps.">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://j-guyy.github.io/trip-reports/resort-skiing.html">
    <meta property="og:image" content="https://j-guyy.github.io/images/skiing/snowbird.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Resort Skiing - Trip Report">
    <meta name="twitter:description" content="Resorts skied across the US and beyond — from Utah powder to the Alps.">
    <meta name="twitter:image" content="https://j-guyy.github.io/images/skiing/snowbird.jpg">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/tripreports.css">
    <link rel="stylesheet" href="../css/multi-adventure.css">
    <link rel="stylesheet" href="../css/map.css">
    <link rel="stylesheet" href="../css/leaflet.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/ski-resorts.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-gesture-handling/dist/leaflet-gesture-handling.css" />
    <link href='https://api.mapbox.com/mapbox.js/plugins/leaflet-fullscreen/v1.0.1/leaflet.fullscreen.css'
        rel='stylesheet' />
    <style>
        .view-toggle {
            display: flex;
            justify-content: center;
            gap: 0;
            margin: 2rem auto 0;
            width: fit-content;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--border-color, #333);
        }
        .view-toggle button {
            background: transparent;
            color: var(--text-secondary, #aaa);
            border: none;
            padding: 0.5rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: background 0.2s, color 0.2s;
        }
        .view-toggle button:first-child {
            border-right: 1px solid var(--border-color, #333);
        }
        .view-toggle button.active {
            background: var(--primary-color, #4CAF50);
            color: #fff;
        }
        .view-toggle button:not(.active):hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-primary, #fff);
        }

        /* Blue accent for repeat visits */
        .peak-card.repeat {
            border-left-color: #2196F3;
        }
        .peak-badge.repeat {
            background: rgba(33, 150, 243, 0.2);
            color: #2196F3;
            border: 1px solid rgba(33, 150, 243, 0.4);
        }

        /* Tally section */
        .tally-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
        }
        .tally-stat {
            background: rgba(45, 45, 45, 0.9);
            border-radius: 8px;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
        }
        .tally-stat strong {
            color: var(--primary-color, #4CAF50);
            font-size: 1.1rem;
        }
        .tally-most-visited {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }
        .tally-mv-label {
            color: rgba(255,255,255,0.4);
            font-size: 0.85rem;
        }
        .tally-mv-tag {
            background: rgba(33, 150, 243, 0.15);
            color: #2196F3;
            border: 1px solid rgba(33, 150, 243, 0.35);
            border-radius: 12px;
            padding: 0.25rem 0.75rem;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
        }

        /* Per-card visit indicators */
        .peak-card-header {
            position: relative;
        }
        .visit-token {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(33, 150, 243, 0.2);
            color: #2196F3;
            border: 1px solid rgba(33, 150, 243, 0.5);
            font-size: 0.7rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .visit-total {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.3);
            margin-top: 4px;
        }
    </style>
</head>

<body class="page fourteeners-page tr-background">

    <nav-bar base-path="../"></nav-bar>

    <div class="content">
        <div class="hero"
            style="background: linear-gradient(to bottom, rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.9)), url('../images/skiing/snowbird.jpg'); background-size: cover; background-position: center;">
            <h1>Resort Skiing</h1>
            <h2>Groomers, powder, and everything in between</h2>
            <div class="view-toggle">
                <button id="btn-date" class="active" onclick="setView('date')">By Date</button>
                <button id="btn-location" onclick="setView('location')">By Location</button>
            </div>
        </div>

        <div id="tally"></div>
        <div id="resort-sections"></div>

        <div class="section-divider">
            <h2>World Resort Map</h2>
        </div>

        <div class="section">
            <div id="ski-summary"></div>
        </div>

        <div class="section">
            <p class="map-description">Explore all visited resorts and bucket list destinations on the interactive map.</p>
            <div class="ski-filters">
                <button class="ski-filter-btn active" data-filter="all">All</button>
                <button class="ski-filter-btn" data-filter="visited">Visited</button>
                <button class="ski-filter-btn" data-filter="not-visited">Not Visited</button>
            </div>
            <div class="vertical-drop-filter">
                <label for="drop-slider">Min Vertical Drop: <span id="drop-value">0</span> ft</label>
                <input type="range" id="drop-slider" min="0" max="5000" step="100" value="0">
            </div>
        </div>

        <div class="section">
            <div class="map-legend-container">
                <div class="map-container">
                    <div id="ski-map"></div>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>Resort List</h2>
            <div class="ski-continent-filter">
                <button class="continent-btn active" data-continent="all">All</button>
                <button class="continent-btn" data-continent="North America">North America</button>
                <button class="continent-btn" data-continent="Europe">Europe</button>
                <button class="continent-btn" data-continent="Asia">Asia</button>
                <button class="continent-btn" data-continent="South America">South America</button>
                <button class="continent-btn" data-continent="Oceania">Oceania</button>
                <button class="continent-btn" data-continent="Africa">Africa</button>
            </div>
            <div id="ski-resort-list"></div>
        </div>
    </div>

    <script src="../js/navbar-component.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-gesture-handling"></script>
    <script src='https://api.mapbox.com/mapbox.js/plugins/leaflet-fullscreen/v1.0.1/Leaflet.fullscreen.min.js'></script>
    <script src="../js/resort-skiing.js"></script>
</body>

</html>
