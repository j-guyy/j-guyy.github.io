<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Primordial — Prehistoric Life Simulator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Georgia', serif; }

#game-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; cursor: crosshair; }

/* ── MAIN MENU ── */
#menu {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; background: #020810;
}
.menu-glow {
  position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 50% at 50% 55%, rgba(29,158,117,0.13) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 20% 80%, rgba(55,138,221,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 30% 30% at 80% 20%, rgba(186,117,23,0.07) 0%, transparent 60%);
}
.menu-title { position: relative; z-index: 1; text-align: center; margin-bottom: 2.8rem; }
.menu-title h1 {
  font-size: clamp(2.8rem, 7vw, 5.5rem); letter-spacing: 0.18em;
  color: #ddf0e8; font-weight: 400; text-transform: uppercase;
  text-shadow: 0 0 60px rgba(29,158,117,0.45), 0 0 120px rgba(29,158,117,0.2);
}
.menu-title p {
  font-size: 0.78rem; letter-spacing: 0.35em; color: rgba(255,255,255,0.35);
  text-transform: uppercase; margin-top: 0.6rem; font-family: 'Georgia', serif;
}
.period-grid {
  position: relative; z-index: 1;
  display: grid; grid-template-columns: repeat(3, 210px); gap: 10px;
}
@media (max-width: 680px) { .period-grid { grid-template-columns: repeat(2, 1fr); } }
.period-card {
  padding: 1.2rem 1.4rem; border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px; cursor: pointer; transition: all 0.18s;
  background: rgba(255,255,255,0.02);
}
.period-card:hover { transform: translateY(-3px); background: rgba(255,255,255,0.05); }
.pc-era { font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 0.35rem; }
.pc-name { font-size: 1.05rem; font-weight: 400; color: #fff; margin-bottom: 0.25rem; }
.pc-creatures { font-size: 0.72rem; color: rgba(255,255,255,0.28); line-height: 1.4; }

/* ── CREATURE SELECT ── */
#creature-select {
  position: fixed; inset: 0; display: none; flex-direction: column;
  align-items: center; justify-content: center; background: #020810;
}
.back-btn {
  position: absolute; top: 1.5rem; left: 1.5rem; cursor: pointer;
  font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase;
  color: rgba(255,255,255,0.35); border: 1px solid rgba(255,255,255,0.12);
  padding: 7px 16px; border-radius: 4px; transition: all 0.15s; font-family: 'Georgia', serif;
}
.back-btn:hover { color: #fff; border-color: rgba(255,255,255,0.35); }
.select-header { text-align: center; margin-bottom: 2.2rem; }
.select-period-label { font-size: 0.7rem; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 0.5rem; }
.select-period-name { font-size: 2.4rem; font-weight: 400; color: #fff; }
.creature-grid { display: grid; grid-template-columns: repeat(3, 195px); gap: 10px; }
@media (max-width: 650px) { .creature-grid { grid-template-columns: repeat(2, 1fr); } }
.creature-card {
  padding: 1.25rem; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
  cursor: pointer; transition: all 0.18s; background: rgba(255,255,255,0.02); text-align: center;
}
.creature-card:hover { transform: translateY(-3px); background: rgba(255,255,255,0.055); }
.cc-name { font-size: 1rem; font-weight: 400; color: #fff; margin-bottom: 0.3rem; }
.cc-role { font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; }
.cc-size { font-size: 0.7rem; color: rgba(255,255,255,0.28); margin-top: 0.4rem; }
.cc-icon { font-size: 1.6rem; margin-bottom: 0.5rem; }

/* ── HUD ── */
#hud { position: fixed; inset: 0; pointer-events: none; display: none; font-family: 'Georgia', serif; }
#hud-top {
  position: absolute; top: 1.4rem; left: 50%; transform: translateX(-50%);
  text-align: center;
}
#hud-period-label { font-size: 0.65rem; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.4); }
#hud-creature-label { font-size: 1.05rem; color: rgba(255,255,255,0.82); margin-top: 2px; }
#crosshair {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 18px; height: 18px;
}
#crosshair::before, #crosshair::after {
  content: ''; position: absolute; background: rgba(255,255,255,0.55); border-radius: 1px;
}
#crosshair::before { width: 1.5px; height: 100%; left: 50%; transform: translateX(-50%); }
#crosshair::after  { height: 1.5px; width: 100%; top: 50%; transform: translateY(-50%); }
#hud-controls {
  position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase;
  color: rgba(255,255,255,0.28); text-align: center; white-space: nowrap;
}
#lock-hint {
  position: absolute; bottom: 4.5rem; left: 50%; transform: translateX(-50%);
  font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase;
  color: rgba(255,255,255,0.45); border: 1px solid rgba(255,255,255,0.18);
  padding: 8px 18px; border-radius: 4px; pointer-events: all; cursor: pointer;
  transition: all 0.15s;
}
#lock-hint:hover { background: rgba(255,255,255,0.06); }
#exit-game {
  position: absolute; top: 1.4rem; right: 1.4rem; pointer-events: all; cursor: pointer;
  font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase;
  color: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.12);
  padding: 7px 15px; border-radius: 4px; transition: all 0.15s; background: none;
  font-family: 'Georgia', serif;
}
#exit-game:hover { color: #fff; border-color: rgba(255,255,255,0.35); }
.period-pip {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px;
  vertical-align: middle;
}
</style>
</head>
<body>

<!-- MAIN MENU -->
<div id="menu">
  <div class="menu-glow"></div>
  <div class="menu-title">
    <h1>Primordial</h1>
    <p>Prehistoric Life Simulator &nbsp;·&nbsp; 539–252 Ma</p>
  </div>
  <div class="period-grid" id="period-grid"></div>
</div>

<!-- CREATURE SELECT -->
<div id="creature-select">
  <div class="back-btn" id="back-btn">← Back</div>
  <div class="select-header">
    <div class="select-period-label">Choose your creature</div>
    <div class="select-period-name" id="sel-period-name"></div>
  </div>
  <div class="creature-grid" id="creature-grid"></div>
</div>

<!-- GAME -->
<canvas id="game-canvas"></canvas>
<div id="hud">
  <div id="hud-top">
    <div id="hud-period-label"></div>
    <div id="hud-creature-label"></div>
  </div>
  <div id="crosshair"></div>
  <div id="lock-hint">Click to look around</div>
  <div id="hud-controls">WASD · Move &nbsp;|&nbsp; Mouse · Look &nbsp;|&nbsp; Space · Jump &nbsp;|&nbsp; Shift · Sprint</div>
  <button id="exit-game">Exit</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// DATA
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      { id: 'tiktaalik',    name: 'Tiktaalik',    role: 'Shore pioneer',       size: '1.5 m',  icon: '🐊', scale: 1.3,  speed: 2.8 },

      { id: 'eryops',       name: 'Eryops',       role: 'Amphibian predator', size: '2 m',      icon: '🐸', scale: 1.6,  speed: 2.2 },
      { id: 'arthropleura', name: 'Arthropleura', role: 'Giant millipede',    size: '2.5 m',    icon: '🐛', scale: 2.4,  speed: 1.8 },

  {

    ground: 0x7a3c20, ambient: 0x140c06, sunColor: 0xe07020, sunIntensity: 1.15,
    waterDepth: false,
    icon: '🦎',
    tagline: 'Synapsids rise — then the Great Dying',
    creatures: [
      { id: 'dimetrodon',   name: 'Dimetrodon',   role: 'Apex predator',      size: '3.5 m',  icon: '🦎', scale: 2.6,  speed: 3.8 },
      { id: 'gorgonopsid',  name: 'Gorgonopsid',  role: 'Saber-toothed pred.', size: '2 m',   icon: '🐅', scale: 2.0,  speed: 5 },
      { id: 'lystrosaurus', name: 'Lystrosaurus', role: 'Stout herbivore',    size: '90 cm',   icon: '🐷', scale: 1.0,  speed: 2.5 },

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// GLOBALS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let scene, camera, renderer, clock;
let activePeriod = null, activeCreature = null;
let playerMesh = null;
let playerYVel = 0, playerOnGround = true;
let keys = {};
let yaw = 0, pitch = 0;
let isLocked = false;
let npcs = [];
let animId = null;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// UI
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function buildMenuCards() {
  const grid = document.getElementById('period-grid');
  PERIODS.forEach(p => {
    const card = document.createElement('div');
    card.className = 'period-card';
    card.style.borderColor = `${p.color}55`;
    card.innerHTML = `
      <div class="pc-era" style="color:${p.color}">${p.mya}</div>
      <div class="pc-name">${p.icon} ${p.name}</div>
      <div class="pc-creatures">${p.creatures.map(c=>c.name).join(' · ')}</div>
    `;
    card.onmouseenter = () => card.style.borderColor = `${p.color}99`;
    card.onmouseleave = () => card.style.borderColor = `${p.color}55`;
    card.onclick = () => showCreatureSelect(p);
    grid.appendChild(card);
  });
}

function showCreatureSelect(period) {
  activePeriod = period;
  document.getElementById('menu').style.display = 'none';
  const sel = document.getElementById('creature-select');
  sel.style.display = 'flex';
  document.getElementById('sel-period-name').textContent = period.name;
  document.getElementById('sel-period-name').style.color = period.color;

  const grid = document.getElementById('creature-grid');
  grid.innerHTML = '';
  period.creatures.forEach(c => {
    const card = document.createElement('div');
    card.className = 'creature-card';
    card.style.borderColor = `${period.color}44`;
    card.innerHTML = `
      <div class="cc-icon">${c.icon}</div>
      <div class="cc-name">${c.name}</div>
      <div class="cc-role" style="color:${period.color}">${c.role}</div>
      <div class="cc-size">${c.size}</div>
    `;
    card.onmouseenter = () => card.style.borderColor = `${period.color}99`;
    card.onmouseleave = () => card.style.borderColor = `${period.color}44`;
    card.onclick = () => launchGame(period, c);
    grid.appendChild(card);
  });
}

function showMenu() {
  document.getElementById('menu').style.display = 'flex';
  document.getElementById('creature-select').style.display = 'none';
  document.getElementById('hud').style.display = 'none';
  document.getElementById('game-canvas').style.display = 'none';
}

function launchGame(period, creature) {
  document.getElementById('creature-select').style.display = 'none';
  document.getElementById('game-canvas').style.display = 'block';
  document.getElementById('hud').style.display = 'block';
  document.getElementById('hud-period-label').innerHTML =
    `<span class="period-pip" style="background:${period.color}"></span>${period.name} · ${period.mya}`;
  document.getElementById('hud-creature-label').textContent = creature.name + ' — ' + creature.role;
  initGame(period, creature);
}

document.getElementById('back-btn').onclick = () => {
  document.getElementById('creature-select').style.display = 'none';
  document.getElementById('menu').style.display = 'flex';
};
document.getElementById('exit-game').onclick = () => {
  if(document.pointerLockElement) document.exitPointerLock();
  if(animId) { cancelAnimationFrame(animId); animId = null; }
  showMenu();
};
document.getElementById('lock-hint').onclick = () => {
  document.getElementById('game-canvas').requestPointerLock();
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CREATURE FACTORY
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function mat(color, spec, shin) {
  return new THREE.MeshPhongMaterial({ color, specular: spec||0x222222, shininess: shin||30 });
}

function buildCreature(id) {
  const g = new THREE.Group();
  switch(id) {
    case 'trilobite': {
      // Segmented oval body
      const body = new THREE.Mesh(new THREE.SphereGeometry(1,12,8), mat(0x9a7518,0x443300,60));
      body.scale.set(0.65, 0.2, 1.2); g.add(body);
      // Head shield
      const ceph = new THREE.Mesh(new THREE.SphereGeometry(0.65,10,6), mat(0x7a5510,0x332200,50));
      ceph.scale.set(1,0.22,0.7); ceph.position.z = -0.9; g.add(ceph);
      // Segments
      for(let i=-1;i<=2;i++){
        const s = new THREE.Mesh(new THREE.BoxGeometry(1.25,0.14,0.24), mat(0x6a4808));
        s.position.set(0,0.08,i*0.24); g.add(s);
      }
      // Pygidium (tail)
      const pyg = new THREE.Mesh(new THREE.SphereGeometry(0.4,8,5), mat(0x8a6010));
      pyg.scale.set(0.9,0.2,0.6); pyg.position.z = 0.85; g.add(pyg);
      // Antennae
      [-0.28,0.28].forEach(x=>{
        const a = new THREE.Mesh(new THREE.CylinderGeometry(0.025,0.01,0.85,4), mat(0x3a2206));
        a.position.set(x,0.12,-1.1); a.rotation.x=-0.45; a.rotation.z=x>0?0.28:-0.28; g.add(a);
      });
      break;
    }

    case 'anomalocaris': {
      // Long segmented body
      const body = new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.48,2.6,10), mat(0x8a3a70,0x441144,50));
      body.rotation.x = Math.PI/2; g.add(body);
      // Head
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.52,10,8), mat(0x6a2a58));
      head.scale.set(1,0.65,0.85); head.position.z=-1.5; g.add(head);
      // Compound eyes
      [[-0.28,0.12],[0.28,0.12]].forEach(([x,y])=>{
        const e = new THREE.Mesh(new THREE.SphereGeometry(0.13,8,6), mat(0x0a0a0a,0x444400,200));
        e.position.set(x,y,-1.62); g.add(e);
      });
      // Frontal appendages
      [-0.22,0.22].forEach(x=>{
        const app = new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.025,1.0,5), mat(0x5a1a48));
        app.position.set(x,-0.22,-1.75); app.rotation.x=0.85; app.rotation.z=x>0?0.45:-0.45; g.add(app);
        // Spines on appendage
        for(let j=0;j<4;j++){
          const sp = new THREE.Mesh(new THREE.ConeGeometry(0.025,0.18,4), mat(0x3a0a30));
          sp.position.set(x>0?0.08:-0.08,0,0.15-j*0.12);
          sp.rotation.z = x>0?-0.8:0.8;
          app.add(sp);
        }
      });
      // Lateral swimming flaps
      for(let i=0;i<6;i++){
        [-1,1].forEach(s=>{
          const f = new THREE.Mesh(new THREE.BoxGeometry(0.55,0.04,0.22), mat(0x9a4a80,0,20));
          f.position.set(s*0.62,0,-0.9+i*0.32); f.rotation.z=s*0.35; g.add(f);
        });
      }
      // Mouth ring
      const mouth = new THREE.Mesh(new THREE.TorusGeometry(0.22,0.05,6,12), mat(0x3a0820));
      mouth.position.z=-1.55; mouth.rotation.x=Math.PI/2; g.add(mouth);
      break;
    }

    case 'pikaia': {
      // Ribbon body (8 segments that wiggle)
      for(let i=0;i<9;i++){
        const s = new THREE.Mesh(new THREE.BoxGeometry(0.08,0.2,0.2), mat(0x3a8060));
        s.position.z = -0.8+i*0.2; g.add(s);
      }
      // Notochord stripe
      const nc = new THREE.Mesh(new THREE.BoxGeometry(0.02,0.04,1.8), mat(0x1a5040));
      nc.position.y=0.04; g.add(nc);
      break;
    }

    case 'orthoceras': {
      // Long straight conical shell

function buildFish(g, bodyCol, bellyCol) {
  const body=new THREE.Mesh(new THREE.SphereGeometry(0.4,10,8), mat(bodyCol));
  body.scale.set(0.62,0.52,1.65); g.add(body);
  const tail=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.52,0.4), mat(bodyCol));
  tail.position.z=0.72; g.add(tail);
  const dfin=new THREE.Mesh(new THREE.BoxGeometry(0.05,0.28,0.32), mat(bodyCol));
  dfin.position.set(0,0.32,0.05); g.add(dfin);
  [-1,1].forEach(s=>{
    const fin=new THREE.Mesh(new THREE.BoxGeometry(0.42,0.05,0.22), mat(bodyCol));
    fin.position.set(s*0.45,0,0.12); fin.rotation.z=s*-0.3; g.add(fin);
  });
  const eye=new THREE.Mesh(new THREE.SphereGeometry(0.075,6,6), mat(0x080808,0x444400,200));
  eye.position.set(0.24,0.1,-0.52); g.add(eye);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ENVIRONMENT BUILDER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function buildWorld(period) {
  // Ground plane with subtle bumps
  const groundGeo = new THREE.PlaneGeometry(400, 400, 60, 60);
  const pos = groundGeo.attributes.position;
  for(let i=0; i<pos.count; i++){
    const x=pos.getX(i), z=pos.getZ(i);
    if(Math.abs(x)>2||Math.abs(z)>2){
      pos.setY(i,
        Math.sin(x*0.09)*Math.cos(z*0.07)*0.7 +
        Math.sin(x*0.22+1.3)*Math.cos(z*0.18)*0.4 +
        Math.sin(x*0.5)*0.15
      );
    }
  }
  groundGeo.computeVertexNormals();
  const ground = new THREE.Mesh(groundGeo,
    new THREE.MeshPhongMaterial({color:period.ground, shininess:4, specular:0x111111})
  );
  ground.rotation.x = -Math.PI/2;
  ground.receiveShadow = true;
  scene.add(ground);

  // Rocks
  for(let i=0;i<55;i++){
    const r = 0.25+Math.random()*2.2;
    const rock = new THREE.Mesh(
      new THREE.DodecahedronGeometry(r,0),
      mat(period.ground-0x0a0a0a,0x111111,3)
    );
    const angle=Math.random()*Math.PI*2, dist=6+Math.random()*110;
    rock.position.set(Math.cos(angle)*dist, r*0.35, Math.sin(angle)*dist);
    rock.rotation.set(Math.random()*6,Math.random()*6,Math.random()*6);
    rock.castShadow = true;
    scene.add(rock);
  }

  // Period-specific vegetation/features
  const objCount = {cambrian:25, ordovician:20, silurian:35, devonian:50, carboniferous:70, permian:40}[period.id]||30;
  for(let i=0;i<objCount;i++){
    const obj = buildVegetation(period);
    if(!obj) continue;
    const angle=Math.random()*Math.PI*2, dist=7+Math.random()*90;
    obj.position.set(Math.cos(angle)*dist, 0, Math.sin(angle)*dist);
    obj.rotation.y = Math.random()*Math.PI*2;
    obj.castShadow = true;
    scene.add(obj);
  }

  // Water plane for marine periods
  if(period.waterDepth){
    const wg=new THREE.PlaneGeometry(400,400);
    const water=new THREE.Mesh(wg, new THREE.MeshPhongMaterial({
      color:period.waterColor, transparent:true, opacity:0.28, shininess:180, specular:0x4488aa
    }));
    water.rotation.x=-Math.PI/2; water.position.y=period.waterY;
    scene.add(water);
    // Caustic particle field
    const pGeo=new THREE.BufferGeometry();
    const pPos=new Float32Array(300*3);
    for(let i=0;i<300;i++){
      pPos[i*3]=(Math.random()-0.5)*80;
      pPos[i*3+1]=Math.random()*period.waterY*0.9;
      pPos[i*3+2]=(Math.random()-0.5)*80;
    }
    pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
    scene.add(new THREE.Points(pGeo, new THREE.PointsMaterial({color:0x88ffcc,size:0.18,transparent:true,opacity:0.4})));
  }
}

function buildVegetation(period) {
  const g = new THREE.Group();
  const rh = () => 0.7+Math.random()*0.6; // random height factor

  switch(period.id) {
    case 'cambrian': case 'ordovician': {
      // Sea anemone / sponge / coral
      const type = Math.floor(Math.random()*3);
      if(type===0) { // Anemone
        const base=new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.3,0.5*rh(),8), mat([0x8a2888,0x287880,0x286888][Math.floor(Math.random()*3)]));
        base.position.y=0.25; g.add(base);
        for(let i=0;i<7;i++){
          const a=(i/7)*Math.PI*2, len=0.55+Math.random()*0.65;
          const tent=new THREE.Mesh(new THREE.CylinderGeometry(0.025,0.018,len,4), mat(0xbb55bb));
          tent.position.set(Math.cos(a)*0.15,0.5+len/2,Math.sin(a)*0.15);
          tent.rotation.z=Math.cos(a)*0.5; tent.rotation.x=Math.sin(a)*0.5; g.add(tent);
        }
      } else if(type===1) { // Tube sponge
        for(let i=0;i<4;i++){
          const h=0.8+Math.random()*1.4;
          const tube=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.14,h,8), mat(0x7a9050));
          tube.position.set((Math.random()-0.5)*0.4,h/2,(Math.random()-0.5)*0.4); g.add(tube);
        }
      } else { // Coral fan
        for(let i=0;i<6;i++){
          const b=new THREE.Mesh(new THREE.BoxGeometry(0.03,0.5+Math.random()*0.8,0.04), mat(0xdd6644));
          b.position.set((i-2.5)*0.12,0.4,0); b.rotation.z=(Math.random()-0.5)*0.4; g.add(b);
        }
      }
      return g;
    }
    case 'silurian': {
      // Early land plants (Cooksonia)
      const n=1+Math.floor(Math.random()*3);
      for(let i=0;i<n;i++){
        const h=0.6+Math.random()*1.4;
        const stalk=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.05,h,5), mat(0x2a7040));
        stalk.position.set((i-n/2)*0.2,h/2,0); g.add(stalk);
        // Y-branch tip
        [-1,1].forEach(s=>{
          const br=new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.03,0.38,4), mat(0x1a5828));
          br.position.set(s*0.1,h*0.5+0.15,0); br.rotation.z=s*0.7; g.add(br);
          // Sporangia (seed pod tip)
          const sp=new THREE.Mesh(new THREE.SphereGeometry(0.06,5,4), mat(0xaa7020));
          sp.position.set(s*0.22,h*0.5+0.35,0); g.add(sp);
        });
      }
      return g;
    }
    case 'devonian': {
      // Archaeopteris-type tree or fern
      const isTree=Math.random()>0.3;
      if(isTree){
        const h=6+Math.random()*14;
        const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.38,h,8), mat(0x5a3818,0x221108,10));
        trunk.position.y=h/2; g.add(trunk);
        // Layered canopy
        for(let i=0;i<3;i++){
          const can=new THREE.Mesh(new THREE.SphereGeometry(1.8+Math.random()*1.8+i*0.2,8,6), mat(0x2a6018,0x113308,15));
          can.scale.y=1.2; can.position.y=h*0.65+i*1.4; g.add(can);
        }
      } else { // fern
        for(let i=0;i<6;i++){
          const a=(i/6)*Math.PI*2;
          const frond=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.05,1.2+Math.random()*0.8), mat(0x3a7828));
          frond.position.set(Math.cos(a)*0.3,0.1,Math.sin(a)*0.3); frond.rotation.y=a; frond.rotation.z=-0.4; g.add(frond);
        }
      }
      return g;
    }
    case 'carboniferous': {
      // Lepidodendron / Sigillaria / Calamites
      const type=Math.floor(Math.random()*3);
      if(type===0) { // Lepidodendron scale tree
        const h=10+Math.random()*18;
        const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.55,h,8), mat(0x2a4a18,0x112210,10));
        trunk.position.y=h/2; g.add(trunk);
        // Crown fronds
        for(let i=0;i<10;i++){
          const a=(i/10)*Math.PI*2;
          const fr=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.05,2.2+Math.random()), mat(0x2a6a20));
          fr.position.set(Math.cos(a)*0.35,h+0.2,Math.sin(a)*0.35);
          fr.rotation.y=a; fr.rotation.z=-0.6; g.add(fr);
        }
      } else if(type===1) { // Calamites (horsetail)
        const h=3+Math.random()*5;
        const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.16,h,8), mat(0x3a6028));
        trunk.position.y=h/2; g.add(trunk);
        for(let j=0;j<5;j++){
          for(let i=0;i<8;i++){
            const a=(i/8)*Math.PI*2;
            const sp=new THREE.Mesh(new THREE.CylinderGeometry(0.018,0.01,0.7,3), mat(0x2a5020));
            sp.position.set(Math.cos(a)*0.18,h*0.2+j*h*0.15,Math.sin(a)*0.18);
            sp.rotation.z=a+Math.PI/2; sp.rotation.x=Math.PI/2; g.add(sp);
          }
        }
      } else { // Cordaites
        const h=5+Math.random()*8;
        const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.25,h,7), mat(0x2a4018));
        trunk.position.y=h/2; g.add(trunk);
        for(let i=0;i<8;i++){
          const a=(i/8)*Math.PI*2;
          const leaf=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.04,1.8), mat(0x3a7828));
          leaf.position.set(Math.cos(a)*0.22,h+0.1,Math.sin(a)*0.22); leaf.rotation.y=a; leaf.rotation.z=-0.35; g.add(leaf);
        }
      }
      return g;
    }
    case 'permian': {
      // Conifer (Walchia) or Glossopteris fern
      if(Math.random()>0.35){
        const h=4+Math.random()*8;
        const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.22,h,7), mat(0x6a3010,0x221108,15));
        trunk.position.y=h/2; g.add(trunk);
        const tiers=3+Math.floor(Math.random()*3);
        for(let i=0;i<tiers;i++){
          const r=1.8-i*0.45, ch=1.4;
          const cone=new THREE.Mesh(new THREE.ConeGeometry(r*(0.8+Math.random()*0.3),ch,8), mat(0x1a4818,0x0a2210,15));
          cone.position.y=h*0.45+i*1.25; g.add(cone);
        }
      } else { // Dead/scrubby bush
        for(let i=0;i<5;i++){
          const a=(i/5)*Math.PI*2, l=0.6+Math.random()*0.9;
          const br=new THREE.Mesh(new THREE.CylinderGeometry(0.025,0.04,l,4), mat(0x5a4020));
          br.position.set(Math.cos(a)*0.2,l/2,Math.sin(a)*0.2); br.rotation.z=Math.cos(a)*0.8; br.rotation.x=Math.sin(a)*0.4; g.add(br);
        }
      }
      return g;
    }
  }
  return null;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// NPC SPAWNING
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function spawnNPCs(period) {
  npcs = [];
  const others = period.creatures.filter(c => c.id !== activeCreature.id);
  others.slice(0,2).forEach(cDef => {
    const count = 4 + Math.floor(Math.random()*3);
    for(let i=0;i<count;i++){
      const mesh = buildCreature(cDef.id);
      mesh.scale.setScalar(cDef.scale * 0.75);
      const ang=Math.random()*Math.PI*2, dist=14+Math.random()*50;
      const baseY = cDef.canFly ? 3.5+Math.random()*4 : cDef.scale*0.45;
      mesh.position.set(Math.cos(ang)*dist, baseY, Math.sin(ang)*dist);
      scene.add(mesh);
      npcs.push({
        mesh, speed: cDef.speed*0.35, canFly:!!cDef.canFly,
        dir: new THREE.Vector3(Math.random()-0.5,0,Math.random()-0.5).normalize(),
        timer: Math.random()*4,
        bobOff: Math.random()*Math.PI*2,
        baseY,
      });
    }
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// GAME INIT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function initGame(period, creature) {
  if(animId){ cancelAnimationFrame(animId); animId=null; }
  if(renderer){ renderer.dispose(); }
  npcs=[];
  playerMesh=null;
  playerYVel=0; playerOnGround=true;
  keys={}; yaw=0; pitch=0; isLocked=false;

  activeCreature = creature;

  // Scene
  scene = new THREE.Scene();
  scene.background = new THREE.Color(period.sky);
  scene.fog = new THREE.FogExp2(period.fog, period.fogDensity);

  // Camera
  camera = new THREE.PerspectiveCamera(72, innerWidth/innerHeight, 0.08, 600);

  // Renderer
  const canvas = document.getElementById('game-canvas');
  renderer = new THREE.WebGLRenderer({canvas, antialias:true, powerPreference:'high-performance'});
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  // Clock
  clock = new THREE.Clock();

  // Lighting
  const amb = new THREE.AmbientLight(period.ambient, 0.9); scene.add(amb);
  const sun = new THREE.DirectionalLight(period.sunColor, period.sunIntensity);
  sun.position.set(60,100,40); sun.castShadow=true;
  sun.shadow.camera.near=0.5; sun.shadow.camera.far=300;
  sun.shadow.camera.left=-80; sun.shadow.camera.right=80;
  sun.shadow.camera.top=80; sun.shadow.camera.bottom=-80;
  sun.shadow.mapSize.set(1024,1024);
  scene.add(sun);
  // Fill light from opposite
  const fill = new THREE.DirectionalLight(period.sunColor, 0.2);
  fill.position.set(-40,20,-30); scene.add(fill);

  // World
  buildWorld(period);

  // Player
  playerMesh = buildCreature(creature.id);
  playerMesh.scale.setScalar(creature.scale);
  const startY = creature.canFly ? 4 : creature.scale * 0.55;
  playerMesh.position.set(0, startY, 0);
  playerMesh.castShadow = true;
  scene.add(playerMesh);

  // NPCs
  spawnNPCs(period);

  // Controls
  window.onkeydown = e => { keys[e.code]=true; if(['Space','ShiftLeft','ShiftRight'].includes(e.code)) e.preventDefault(); };
  window.onkeyup   = e => { keys[e.code]=false; };
  canvas.onclick = () => canvas.requestPointerLock();
  document.onpointerlockchange = () => {
    isLocked = document.pointerLockElement===canvas;
    document.getElementById('lock-hint').style.display = isLocked?'none':'block';
  };
  document.onmousemove = e => {
    if(!isLocked) return;
    yaw -= e.movementX*0.0022;
    pitch -= e.movementY*0.0022;
    pitch = Math.max(-Math.PI*0.32, Math.min(Math.PI*0.32, pitch));
  };
  window.onresize = () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
  };

  // Start loop
  loop();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// GAME LOOP
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const _fwd = new THREE.Vector3();
const _rgt = new THREE.Vector3();
const _mov = new THREE.Vector3();
const _camTarget = new THREE.Vector3();
const _camLookAt = new THREE.Vector3();

function loop() {
  animId = requestAnimationFrame(loop);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t  = clock.elapsedTime;

  if(!playerMesh) return;

  const speed = activeCreature.speed * (keys['ShiftLeft']||keys['ShiftRight'] ? 1.85 : 1.0);
  const groundY = activeCreature.scale * 0.55;

  // Movement vectors from camera yaw
  _fwd.set(-Math.sin(yaw), 0, -Math.cos(yaw));
  _rgt.set( Math.cos(yaw), 0, -Math.sin(yaw));
  _mov.set(0,0,0);

  if(keys['KeyW']||keys['ArrowUp'])    _mov.addScaledVector(_fwd, 1);
  if(keys['KeyS']||keys['ArrowDown'])  _mov.addScaledVector(_fwd,-1);
  if(keys['KeyA']||keys['ArrowLeft'])  _mov.addScaledVector(_rgt,-1);
  if(keys['KeyD']||keys['ArrowRight']) _mov.addScaledVector(_rgt, 1);
  const moving = _mov.lengthSq() > 0.001;
  if(moving) _mov.normalize().multiplyScalar(speed * dt);

  playerMesh.position.add(_mov);

  // Flying vs gravity
  if(activeCreature.canFly){
    if(keys['Space'])      playerMesh.position.y += speed*0.55*dt;
    if(keys['ShiftLeft']||keys['ShiftRight']) playerMesh.position.y -= speed*0.45*dt;
    playerMesh.position.y = Math.max(1.5, playerMesh.position.y);
    // Gentle hover bob
    playerMesh.position.y += Math.sin(t*2.2)*0.018;
    // Wing flap animation
    let wingIdx=0;
    playerMesh.traverse(c=>{
      if(c.isMesh && c.geometry.type==='PlaneGeometry'){
        const side = wingIdx%2===0?1:-1;
        const tier = wingIdx<2?1:0.7;
        c.rotation.z = side*(0.18+Math.sin(t*14+wingIdx*0.5)*0.38*tier);
        wingIdx++;
      }
    });
  } else {
    if(keys['Space'] && playerOnGround){ playerYVel=7.5; playerOnGround=false; }
    playerYVel -= 20*dt;
    playerMesh.position.y += playerYVel*dt;
    if(playerMesh.position.y<=groundY){
      playerMesh.position.y=groundY; playerYVel=0; playerOnGround=true;
    }
    // Walk bob
    if(moving && playerOnGround){
      playerMesh.position.y += Math.sin(t*9)*0.025*Math.min(speed,6);
    }
  }

  // Face direction
  if(moving){
    const targetAngle = Math.atan2(_mov.x,_mov.z);
    // Smooth rotation
    let diff = targetAngle - playerMesh.rotation.y;
    while(diff> Math.PI) diff-=Math.PI*2;
    while(diff<-Math.PI) diff+=Math.PI*2;
    playerMesh.rotation.y += diff*0.18;
  }

  // Boundary
  const B=120;
  playerMesh.position.x=Math.max(-B,Math.min(B,playerMesh.position.x));
  playerMesh.position.z=Math.max(-B,Math.min(B,playerMesh.position.z));

  // Camera — third-person behind player
  const camDist = activeCreature.scale * 5.5 + 2;
  const camHeight = activeCreature.scale * 2.5 + 1.2;
  _camTarget.set(
    playerMesh.position.x + Math.sin(yaw)*camDist,
    playerMesh.position.y + camHeight,
    playerMesh.position.z + Math.cos(yaw)*camDist
  );
  camera.position.lerp(_camTarget, 0.1);
  _camLookAt.set(
    playerMesh.position.x - Math.sin(yaw+Math.PI)*1.5 + Math.cos(yaw)*pitch*3,
    playerMesh.position.y + activeCreature.scale*1.5 + pitch*4,
    playerMesh.position.z - Math.cos(yaw+Math.PI)*1.5 - Math.sin(yaw)*pitch*3
  );
  camera.lookAt(_camLookAt);

  // NPC update
  npcs.forEach(npc=>{
    npc.timer -= dt;
    if(npc.timer<=0){
      npc.dir.set(Math.random()-0.5,0,Math.random()-0.5).normalize();
      npc.timer=2+Math.random()*5;
    }
    npc.mesh.position.addScaledVector(npc.dir, npc.speed*dt);
    // Smooth yaw
    const ty=Math.atan2(npc.dir.x,npc.dir.z);
    let yd=ty-npc.mesh.rotation.y;
    while(yd>Math.PI) yd-=Math.PI*2;
    while(yd<-Math.PI) yd+=Math.PI*2;
    npc.mesh.rotation.y+=yd*0.08;

    if(npc.canFly){
      npc.mesh.position.y = npc.baseY + Math.sin(t*1.8+npc.bobOff)*1.2;
    } else {
      npc.mesh.position.y = npc.baseY + Math.sin(t*3.5+npc.bobOff)*0.04;
    }
    // Boundary bounce
    if(Math.abs(npc.mesh.position.x)>85) npc.dir.x*=-1;
    if(Math.abs(npc.mesh.position.z)>85) npc.dir.z*=-1;
  });

  renderer.render(scene, camera);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// INIT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
buildMenuCards();
showMenu();
</script>
